<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoStore — Iniciar Sesión</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c10;--surface:#0e1418;--surface2:#141c22;--border:#1e2a32;--accent:#00e5a0;--text:#e8f0f5;--muted:#5a7080;--accent3:#ff6b35}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(0,229,160,.04) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(0,119,255,.04) 0%,transparent 60%);pointer-events:none}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:400px;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);border-radius:20px 20px 0 0}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:32px}
.brand-icon{width:48px;height:48px;background:var(--accent);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:var(--bg)}
.brand-name{font-size:24px;font-weight:800}.brand-name span{color:var(--accent)}
.brand-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
h2{font-size:18px;font-weight:700;margin-bottom:6px}
.subtitle{font-size:12px;color:var(--muted);margin-bottom:28px;font-family:'DM Mono',monospace}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;margin-bottom:6px}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:11px 14px;font-size:13px;color:var(--text);font-family:'Syne',sans-serif;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
.remember{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:24px;cursor:pointer}
.remember input{accent-color:var(--accent)}
.btn-login{width:100%;background:var(--accent);color:var(--bg);border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Syne',sans-serif;transition:opacity .2s;letter-spacing:.02em}
.btn-login:hover{opacity:.88}
.alert{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:600;margin-bottom:16px}
.alert-danger{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.25);color:var(--accent3)}
.alert-success{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.25);color:var(--accent)}
.alert-warning{background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.2);color:#ffd166}
.footer{text-align:center;margin-top:24px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">A</div>
    <div>
      <div class="brand-name">Auto<span>Store</span></div>
      <div class="brand-sub">Sistema de Gestión</div>
    </div>
  </div>

  <h2>Iniciar sesión</h2>
  <div class="subtitle">Ingresá tus credenciales para continuar</div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="alert alert-{{ cat }}">{{ msg }}</div>
  {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-input" placeholder="tu@email.com" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" name="password" class="form-input" placeholder="••••••••" required>
    </div>
    <label class="remember">
      <input type="checkbox" name="remember"> Recordarme
    </label>
    <button type="submit" class="btn-login">Entrar →</button>
  </form>

  <div class="footer">AutoStore v1.0 · Sistema de gestión inteligente</div>
</div>
</body>
</html>
